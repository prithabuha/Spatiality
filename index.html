<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI Rounded', 'Segoe UI', system-ui, sans-serif;
    }

    #app { width: 100vw; height: 100vh; position: relative; }

    /* ── 3D canvas ─────────────────────────────────────────────────────── */
    #three-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%; z-index: 1;
    }

    /* ── Hand skeleton overlay ─────────────────────────────────────────── */
    #hand-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 3; pointer-events: none;
    }

    /* ── Finger cursor — follows index tip ─────────────────────────────── */
    #finger-cursor {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 15;
      transform: translate(-50%, -50%);
      border: 3px solid #c06000;
      transition: width .04s, height .04s, border-color .08s, box-shadow .08s;
      display: none;
    }

    /* ── Webcam mini-view ──────────────────────────────────────────────── */
    #webcam-mini {
      position: absolute; bottom: 14px; right: 14px;
      width: 130px; height: 98px;
      border-radius: 14px; overflow: hidden;
      border: 3px solid rgba(200, 150, 60, 0.40);
      z-index: 10;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }
    #webcam-bg {
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }

    /* ── Hint chip ─────────────────────────────────────────────────────── */
    #hint-chip {
      position: absolute;
      bottom: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 245, 225, 0.88);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(200, 140, 40, 0.35);
      border-radius: 28px;
      padding: 9px 26px;
      font-size: 14px; font-weight: 600;
      color: #a05010;
      z-index: 20; pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(160,100,20,0.12);
      letter-spacing: 0.3px;
    }

    /* ── Brush Lab (hybrid UI) ─────────────────────────────────────────── */
    #brush-lab-toggle {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 24;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #f8efe2;
      background: linear-gradient(135deg, #3c4d64, #556f8c);
      box-shadow: 0 8px 28px rgba(24, 40, 60, 0.35);
      cursor: pointer;
    }

    #brush-lab {
      position: absolute;
      top: 58px;
      left: 14px;
      width: 290px;
      z-index: 23;
      border-radius: 16px;
      border: 1px solid rgba(48, 70, 94, 0.24);
      background:
        radial-gradient(circle at 12% 0%, rgba(120, 165, 205, 0.18), transparent 45%),
        linear-gradient(160deg, rgba(255, 250, 241, 0.95), rgba(248, 241, 228, 0.92));
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 40px rgba(24, 40, 60, 0.20);
      padding: 14px;
      transition: opacity .18s ease, transform .18s ease;
    }

    #brush-lab.is-collapsed {
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
    }

    .lab-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #4c5d70;
    }

    .lab-head strong {
      font-size: 13px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .lab-head span {
      font-size: 11px;
      font-weight: 700;
      color: #73879c;
    }

    .lab-row {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: #55606f;
      font-size: 12px;
      font-weight: 600;
    }

    .lab-row input[type='range'] {
      accent-color: #4f87ad;
      width: 100%;
    }

    .lab-row input[type='color'] {
      width: 100%;
      height: 30px;
      border: 1px solid rgba(67, 97, 122, 0.28);
      border-radius: 8px;
      background: #fff;
      padding: 0;
      cursor: pointer;
    }

    .lab-row select {
      width: 100%;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(67, 97, 122, 0.28);
      background: rgba(255, 255, 255, 0.85);
      color: #33485f;
      font-weight: 600;
      padding: 0 8px;
    }

    .lab-value {
      width: 40px;
      text-align: right;
      font-size: 11px;
      color: #6a7f93;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 720px) {
      #brush-lab-toggle {
        top: 10px;
        left: 10px;
        padding: 9px 14px;
      }

      #brush-lab {
        top: 52px;
        left: 10px;
        width: min(92vw, 310px);
      }

      #god-mode-toggle {
        top: 10px;
        right: 10px;
        padding: 9px 14px;
      }

      #god-mode {
        top: 52px;
        right: 10px;
        width: min(92vw, 310px);
      }
    }

    /* ── God Mode Panel ───────────────────────────────────────────────────── */
    #god-mode-toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 24;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #fff8e8;
      background: linear-gradient(135deg, #7c3700, #c46200);
      box-shadow: 0 8px 28px rgba(180, 80, 0, 0.45);
      cursor: pointer;
    }

    #god-mode {
      position: absolute;
      top: 58px;
      right: 14px;
      width: 300px;
      z-index: 23;
      border-radius: 16px;
      border: 1px solid rgba(200, 120, 20, 0.30);
      background:
        radial-gradient(circle at 88% 0%, rgba(220, 140, 30, 0.14), transparent 45%),
        linear-gradient(160deg, rgba(30, 20, 10, 0.94), rgba(20, 14, 6, 0.92));
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(220, 140, 30, 0.12);
      padding: 14px;
      transition: opacity .18s ease, transform .18s ease;
      max-height: 88vh;
      overflow-y: auto;
    }

    #god-mode::-webkit-scrollbar { width: 4px; }
    #god-mode::-webkit-scrollbar-track { background: transparent; }
    #god-mode::-webkit-scrollbar-thumb { background: rgba(200,120,20,0.4); border-radius: 4px; }

    #god-mode.is-collapsed {
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
    }

    .god-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(200, 120, 20, 0.22);
    }

    .god-head strong {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #f0a840;
    }

    .god-head span {
      font-size: 10px;
      font-weight: 700;
      color: #a07030;
      letter-spacing: 0.3px;
    }

    .god-section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(200, 120, 20, 0.12);
    }

    .god-section-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #8a6030;
      margin-bottom: 6px;
    }

    .god-row {
      display: grid;
      grid-template-columns: 104px 1fr 44px;
      align-items: center;
      gap: 7px;
      margin-top: 7px;
    }

    .god-label {
      font-size: 11px;
      font-weight: 600;
      color: #d4a060;
      line-height: 1.25;
    }

    .god-label small {
      display: block;
      font-size: 9px;
      font-weight: 500;
      color: #6a4820;
      letter-spacing: 0.2px;
    }

    .god-row input[type='range'] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 4px;
      background: rgba(200, 120, 20, 0.18);
      outline: none;
      cursor: pointer;
    }

    .god-row input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb84d, #d46c00);
      box-shadow: 0 0 6px rgba(220, 140, 0, 0.6);
      cursor: pointer;
    }

    .god-row input[type='range']::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffb84d, #d46c00);
      border: none;
      cursor: pointer;
    }

    .god-value {
      text-align: right;
      font-size: 11px;
      font-weight: 700;
      color: #f0a840;
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', monospace;
    }

    .god-reset-btn {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(200, 120, 20, 0.35);
      border-radius: 10px;
      background: rgba(200, 120, 20, 0.12);
      color: #d4a060;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .god-reset-btn:hover {
      background: rgba(200, 120, 20, 0.25);
    }

    /* ── Colour-bucket labels (cosmetic, rendered in canvas via THREE) ─── */
    /* No HTML panels, sliders, or buttons — everything is 3D + gesture    */

    /* ── Orb touch ripple rings ─────────────────────────────────────────── */
    /* Injected by Scene.triggerOrbRipple() on colour selection.            */
    @keyframes orbRipple {
      0%   {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        border-width: 4px;
      }
      60%  {
        opacity: 0.5;
      }
      100% {
        transform: translate(-50%, -50%) scale(5.5);
        opacity: 0;
        border-width: 1px;
      }
    }

    .orb-ripple {
      position: fixed;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid currentColor;   /* colour set via JS style.color */
      pointer-events: none;
      z-index: 50;
      animation: orbRipple 0.72s cubic-bezier(0.05, 0.45, 0.35, 1.0) forwards;
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="three-canvas"></canvas>
  <canvas id="hand-overlay"></canvas>
  <div id="finger-cursor"></div>

  <div id="webcam-mini">
    <video id="webcam-bg" autoplay playsinline muted></video>
  </div>

  <button id="brush-lab-toggle" type="button">Brush Lab</button>
  <aside id="brush-lab" class="is-collapsed" aria-label="Brush controls">
    <div class="lab-head">
      <strong>Watercolor Studio</strong>
      <span id="brush-profile-label">Balanced</span>
    </div>

    <label class="lab-row" for="brush-preset">
      <span>Preset</span>
      <select id="brush-preset">
        <option value="fresco">Fresco Detail</option>
        <option value="rebelle">Rebelle Inspired</option>
        <option value="wash">Soft Wash</option>
        <option value="dry">Dry Texture</option>
        <option value="splash">Wet Splatter</option>
      </select>
      <span class="lab-value"></span>
    </label>

    <label class="lab-row" for="brush-color">
      <span>Color</span>
      <input id="brush-color" type="color" value="#d93060" />
      <span class="lab-value"></span>
    </label>

    <label class="lab-row" for="brush-size">
      <span>Size</span>
      <input id="brush-size" type="range" min="0.016" max="0.09" step="0.001" value="0.034" />
      <span id="brush-size-value" class="lab-value">0.034</span>
    </label>

    <label class="lab-row" for="brush-water">
      <span>Water</span>
      <input id="brush-water" type="range" min="0.08" max="0.90" step="0.01" value="0.42" />
      <span id="brush-water-value" class="lab-value">0.42</span>
    </label>

    <label class="lab-row" for="brush-pigment">
      <span>Pigment</span>
      <input id="brush-pigment" type="range" min="0.10" max="0.90" step="0.01" value="0.34" />
      <span id="brush-pigment-value" class="lab-value">0.34</span>
    </label>

    <label class="lab-row" for="brush-mix">
      <span>Mixing</span>
      <input id="brush-mix" type="range" min="0.00" max="0.85" step="0.01" value="0.30" />
      <span id="brush-mix-value" class="lab-value">0.30</span>
    </label>

    <label class="lab-row" for="brush-smoothing">
      <span>Smoothing</span>
      <input id="brush-smoothing" type="range" min="0.00" max="0.85" step="0.01" value="0.25" />
      <span id="brush-smoothing-value" class="lab-value">0.25</span>
    </label>
  </aside>

  <div id="hint-chip">Point finger to paint · Wave both hands to clear ✦</div>

  <!-- ── God Mode Panel ─────────────────────────────────────────────────── -->
  <button id="god-mode-toggle" type="button">⚡ God Mode</button>
  <aside id="god-mode" class="is-collapsed" aria-label="God Mode controls">

    <div class="god-head">
      <strong>⚡ God Mode</strong>
      <span>DESIGNER CONTROLS</span>
    </div>

    <!-- BRUSH -->
    <div class="god-section-label">Brush</div>

    <label class="god-row">
      <span class="god-label">Brush Size<small>stroke footprint</small></span>
      <input type="range" id="gm-size" min="0.003" max="0.090" step="0.001" value="0.018" />
      <span class="god-value" id="gv-size">0.018</span>
    </label>

    <label class="god-row">
      <span class="god-label">Pigment Load<small>opacity / density</small></span>
      <input type="range" id="gm-pigment" min="0.05" max="0.95" step="0.01" value="0.30" />
      <span class="god-value" id="gv-pigment">0.30</span>
    </label>

    <label class="god-row">
      <span class="god-label">Splatter Spread<small>organic edge chaos</small></span>
      <input type="range" id="gm-splat" min="0.20" max="1.80" step="0.01" value="0.55" />
      <span class="god-value" id="gv-splat">0.55</span>
    </label>

    <!-- WATER / FLOW -->
    <div class="god-section">
      <div class="god-section-label">Water &amp; Flow</div>

      <label class="god-row">
        <span class="god-label">Substrate Wetness<small>paper humidity</small></span>
        <input type="range" id="gm-wetness" min="0.0" max="1.0" step="0.01" value="0.40" />
        <span class="god-value" id="gv-wetness">0.40</span>
      </label>

      <label class="god-row">
        <span class="god-label">Diffusion Speed<small>how fast paint bleeds</small></span>
        <input type="range" id="gm-diffusion" min="0.02" max="0.65" step="0.01" value="0.30" />
        <span class="god-value" id="gv-diffusion">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Color Mixing<small>wet-on-wet merge</small></span>
        <input type="range" id="gm-mix" min="0.00" max="0.95" step="0.01" value="0.30" />
        <span class="god-value" id="gv-mix">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Gravity Drip<small>downward flow strength</small></span>
        <input type="range" id="gm-gravity" min="0.00" max="0.60" step="0.01" value="0.05" />
        <span class="god-value" id="gv-gravity">0.05</span>
      </label>
    </div>

    <!-- DRYING -->
    <div class="god-section">
      <div class="god-section-label">Drying &amp; Texture</div>

      <label class="god-row">
        <span class="god-label">Color Drying Time<small>seconds color stays active</small></span>
        <input type="range" id="gm-wetwindow" min="0.10" max="5.00" step="0.05" value="1.50" />
        <span class="god-value" id="gv-wetwindow">1.50s</span>
      </label>

      <label class="god-row">
        <span class="god-label">Evaporation Rate<small>how fast color dries</small></span>
        <input type="range" id="gm-evap" min="0.10" max="4.00" step="0.05" value="0.60" />
        <span class="god-value" id="gv-evap">0.60x</span>
      </label>

      <label class="god-row">
        <span class="god-label">Edge Intensity<small>border ring darkness</small></span>
        <input type="range" id="gm-edge" min="0.00" max="2.00" step="0.05" value="0.30" />
        <span class="god-value" id="gv-edge">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Granulation Depth<small>paper grain influence</small></span>
        <input type="range" id="gm-grain" min="0.10" max="2.20" step="0.05" value="1.00" />
        <span class="god-value" id="gv-grain">1.00</span>
      </label>

      <label class="god-row">
        <span class="god-label">Backrun Bloom<small>cauliflower bleed effect</small></span>
        <input type="range" id="gm-backrun" min="0.20" max="2.00" step="0.05" value="1.00" />
        <span class="god-value" id="gv-backrun">1.00</span>
      </label>
    </div>

    <button class="god-reset-btn" id="gm-reset">↺ Reset to Defaults</button>
  </aside>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
