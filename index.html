<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint World</title>
  <!-- Varela Round — friendly rounded sans-serif for all UI text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0e0b06;
      font-family: 'Varela Round', 'Segoe UI Rounded', system-ui, sans-serif;
    }

    #app { width: 100vw; height: 100vh; position: relative; }

    /* ── 3D canvas ─────────────────────────────────────────────────────── */
    #three-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%; z-index: 1;
    }

    /* ── Hand skeleton overlay ─────────────────────────────────────────── */
    #hand-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 3; pointer-events: none;
    }

    /* ── Finger cursor — hidden; WaterCursor owns the visual now ───────── */
    #finger-cursor { display: none !important; }

    /* ── Webcam mini-view ──────────────────────────────────────────────── */
    #webcam-mini {
      position: absolute; bottom: 14px; right: 14px;
      width: 130px; height: 98px;
      border-radius: 14px; overflow: hidden;
      border: 1.5px solid rgba(180, 130, 60, 0.28);
      z-index: 10;
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.50),
        0 0 0 1px rgba(200, 150, 70, 0.06);
    }
    #webcam-bg {
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }

    /* ── Hint chip ─────────────────────────────────────────────────────── */
    #hint-chip {
      position: absolute;
      bottom: 175px; left: 50%; transform: translateX(-50%);
      background: rgba(16, 11, 5, 0.82);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border: 1px solid rgba(180, 130, 55, 0.22);
      border-radius: 999px;
      padding: 9px 26px;
      font-family: 'Varela Round', sans-serif;
      font-size: 13px;
      color: rgba(215, 175, 105, 0.90);
      z-index: 20; pointer-events: none;
      white-space: nowrap;
      box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(220, 160, 70, 0.10);
      letter-spacing: 0.3px;
    }

    /* ── Toggle Buttons — unified pill style ──────────────────────────── */
    #brush-lab-toggle,
    #god-mode-toggle {
      position: absolute;
      top: 14px;
      z-index: 24;
      border: 1px solid rgba(195, 145, 65, 0.32);
      border-radius: 999px;
      padding: 10px 18px;
      font-family: 'Varela Round', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: rgba(228, 185, 115, 0.95);
      background: linear-gradient(
        145deg,
        rgba(22, 15, 6, 0.96),
        rgba(32, 22, 8, 0.92)
      );
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 6px 20px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(220, 160, 75, 0.14),
        inset 0 0 0 1px rgba(200, 145, 55, 0.06);
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }
    #brush-lab-toggle:hover,
    #god-mode-toggle:hover {
      border-color: rgba(215, 165, 75, 0.52);
      color: rgba(245, 205, 135, 1.0);
      box-shadow:
        0 6px 20px rgba(0, 0, 0, 0.50),
        0 0 18px rgba(170, 115, 35, 0.22),
        inset 0 1px 0 rgba(235, 175, 85, 0.20),
        inset 0 0 0 1px rgba(210, 155, 60, 0.10);
    }
    #brush-lab-toggle { left: 14px; }
    #god-mode-toggle  { right: 14px; }

    /* ── Panels — unified glassmorphic dark card ───────────────────────── */
    #brush-lab,
    #god-mode {
      position: absolute;
      z-index: 23;
      border-radius: 18px;
      border: 1px solid rgba(180, 130, 55, 0.17);
      background:
        radial-gradient(ellipse at 14% 0%, rgba(195, 140, 50, 0.07) 0%, transparent 52%),
        linear-gradient(158deg, rgba(22, 15, 6, 0.96), rgba(16, 11, 5, 0.94));
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow:
        0 22px 52px rgba(0, 0, 0, 0.60),
        0 6px 18px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(220, 165, 70, 0.11),
        inset 0 0 0 1px rgba(200, 150, 55, 0.04);
      padding: 16px;
      transition: opacity .18s ease, transform .18s ease;
    }

    #brush-lab {
      top: 58px;
      left: 14px;
      width: 292px;
    }

    #god-mode {
      top: 58px;
      right: 14px;
      width: 304px;
      max-height: 88vh;
      overflow-y: auto;
    }

    #god-mode::-webkit-scrollbar { width: 3px; }
    #god-mode::-webkit-scrollbar-track { background: transparent; }
    #god-mode::-webkit-scrollbar-thumb {
      background: rgba(195, 130, 40, 0.28);
      border-radius: 3px;
    }

    #brush-lab.is-collapsed,
    #god-mode.is-collapsed {
      opacity: 0;
      transform: translateY(-10px) scale(0.97);
      pointer-events: none;
    }

    /* ── Panel headers ─────────────────────────────────────────────────── */
    .lab-head,
    .god-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(180, 130, 52, 0.14);
    }

    .lab-head strong,
    .god-head strong {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(218, 173, 98, 0.96);
    }

    .lab-head span,
    .god-head span {
      font-size: 10px;
      font-weight: 600;
      color: rgba(140, 100, 42, 0.72);
      letter-spacing: 0.4px;
    }

    /* ── Brush Lab rows ────────────────────────────────────────────────── */
    .lab-row {
      display: grid;
      grid-template-columns: 84px 1fr 44px;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      color: rgba(208, 172, 118, 0.90);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .lab-value {
      text-align: right;
      font-size: 10.5px;
      color: rgba(185, 140, 70, 0.78);
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', monospace;
    }

    .lab-row input[type='color'] {
      width: 100%;
      height: 28px;
      border: 1px solid rgba(180, 130, 52, 0.24);
      border-radius: 8px;
      background: rgba(20, 14, 6, 0.60);
      padding: 2px;
      cursor: pointer;
    }

    .lab-row select {
      width: 100%;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(175, 128, 50, 0.22);
      background: rgba(18, 13, 5, 0.85);
      color: rgba(208, 172, 118, 0.95);
      font-family: 'Varela Round', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 0 8px;
    }

    /* ── God Mode section dividers & labels ────────────────────────────── */
    .god-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(175, 128, 50, 0.10);
    }

    .god-section-label {
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgba(148, 105, 38, 0.68);
      margin-bottom: 8px;
    }

    /* ── God Mode rows ─────────────────────────────────────────────────── */
    .god-row {
      display: grid;
      grid-template-columns: 100px 1fr 46px;
      align-items: center;
      gap: 10px;
      margin-top: 9px;
    }

    .god-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(208, 172, 118, 0.92);
      line-height: 1.30;
      letter-spacing: 0.1px;
    }

    .god-label small {
      display: block;
      font-size: 9px;
      font-weight: 500;
      color: rgba(138, 98, 40, 0.62);
      letter-spacing: 0.2px;
      margin-top: 1px;
    }

    .god-value {
      text-align: right;
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(212, 162, 76, 0.90);
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', monospace;
    }

    /* ── Unified slider — both panels ──────────────────────────────────── */
    .lab-row input[type='range'],
    .god-row input[type='range'] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 4px;
      background: rgba(175, 125, 46, 0.16);
      outline: none;
      cursor: pointer;
    }

    /* Thumb — shared radial amber gem */
    .lab-row input[type='range']::-webkit-slider-thumb,
    .god-row input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 34% 34%, #ffd580, #c47600);
      box-shadow:
        0 0 5px rgba(195, 128, 20, 0.48),
        0 1px 4px rgba(0, 0, 0, 0.52);
      cursor: pointer;
      transition: box-shadow 0.15s ease;
    }
    .lab-row input[type='range']:hover::-webkit-slider-thumb,
    .god-row input[type='range']:hover::-webkit-slider-thumb {
      box-shadow:
        0 0 10px rgba(215, 148, 28, 0.68),
        0 1px 5px rgba(0, 0, 0, 0.50);
    }

    .lab-row input[type='range']::-moz-range-thumb,
    .god-row input[type='range']::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 34% 34%, #ffd580, #c47600);
      border: none;
      cursor: pointer;
    }

    /* ── God Mode reset button ─────────────────────────────────────────── */
    .god-reset-btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      border: 1px solid rgba(175, 128, 50, 0.26);
      border-radius: 10px;
      background: rgba(175, 118, 28, 0.09);
      color: rgba(195, 150, 75, 0.82);
      font-family: 'Varela Round', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .god-reset-btn:hover {
      background: rgba(195, 138, 38, 0.17);
      border-color: rgba(200, 148, 60, 0.42);
    }

    /* ── Orb touch ripple rings ─────────────────────────────────────────── */
    @keyframes orbRipple {
      0%   {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        border-width: 4px;
      }
      60%  {
        opacity: 0.5;
      }
      100% {
        transform: translate(-50%, -50%) scale(5.5);
        opacity: 0;
        border-width: 1px;
      }
    }

    .orb-ripple {
      position: fixed;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid currentColor;
      pointer-events: none;
      z-index: 50;
      animation: orbRipple 0.72s cubic-bezier(0.05, 0.45, 0.35, 1.0) forwards;
    }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      #brush-lab-toggle {
        top: 10px;
        left: 10px;
        padding: 9px 14px;
      }

      #brush-lab {
        top: 52px;
        left: 10px;
        width: min(92vw, 310px);
      }

      #god-mode-toggle {
        top: 10px;
        right: 10px;
        padding: 9px 14px;
      }

      #god-mode {
        top: 52px;
        right: 10px;
        width: min(92vw, 310px);
      }
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="three-canvas"></canvas>
  <canvas id="hand-overlay"></canvas>
  <div id="finger-cursor"></div>

  <div id="webcam-mini">
    <video id="webcam-bg" autoplay playsinline muted></video>
  </div>

  <button id="brush-lab-toggle" type="button">Brush Lab</button>
  <aside id="brush-lab" class="is-collapsed" aria-label="Brush controls">
    <div class="lab-head">
      <strong>Watercolor Studio</strong>
      <span id="brush-profile-label">Balanced</span>
    </div>

    <label class="lab-row" for="brush-preset">
      <span>Preset</span>
      <select id="brush-preset">
        <option value="fresco">Fresco Detail</option>
        <option value="rebelle">Rebelle Inspired</option>
        <option value="wash">Soft Wash</option>
        <option value="dry">Dry Texture</option>
        <option value="splash">Wet Splatter</option>
      </select>
      <span class="lab-value"></span>
    </label>

    <label class="lab-row" for="brush-color">
      <span>Color</span>
      <input id="brush-color" type="color" value="#d93060" />
      <span class="lab-value"></span>
    </label>

    <label class="lab-row" for="brush-size">
      <span>Size</span>
      <input id="brush-size" type="range" min="0.016" max="0.09" step="0.001" value="0.034" />
      <span id="brush-size-value" class="lab-value">0.034</span>
    </label>

    <label class="lab-row" for="brush-water">
      <span>Water</span>
      <input id="brush-water" type="range" min="0.08" max="0.90" step="0.01" value="0.42" />
      <span id="brush-water-value" class="lab-value">0.42</span>
    </label>

    <label class="lab-row" for="brush-pigment">
      <span>Pigment</span>
      <input id="brush-pigment" type="range" min="0.10" max="0.90" step="0.01" value="0.34" />
      <span id="brush-pigment-value" class="lab-value">0.34</span>
    </label>

    <label class="lab-row" for="brush-mix">
      <span>Mixing</span>
      <input id="brush-mix" type="range" min="0.00" max="0.85" step="0.01" value="0.30" />
      <span id="brush-mix-value" class="lab-value">0.30</span>
    </label>

    <label class="lab-row" for="brush-smoothing">
      <span>Smoothing</span>
      <input id="brush-smoothing" type="range" min="0.00" max="0.85" step="0.01" value="0.25" />
      <span id="brush-smoothing-value" class="lab-value">0.25</span>
    </label>
  </aside>

  <div id="hint-chip">Point finger to paint · Wave both hands to clear ✦</div>

  <!-- ── God Mode Panel ─────────────────────────────────────────────────── -->
  <button id="god-mode-toggle" type="button">⚡ God Mode</button>
  <aside id="god-mode" class="is-collapsed" aria-label="God Mode controls">

    <div class="god-head">
      <strong>⚡ God Mode</strong>
      <span>DESIGNER CONTROLS</span>
    </div>

    <!-- BRUSH -->
    <div class="god-section-label">Brush</div>

    <label class="god-row">
      <span class="god-label">Brush Size<small>stroke footprint</small></span>
      <input type="range" id="gm-size" min="0.003" max="0.090" step="0.001" value="0.018" />
      <span class="god-value" id="gv-size">0.018</span>
    </label>

    <label class="god-row">
      <span class="god-label">Pigment Load<small>opacity / density</small></span>
      <input type="range" id="gm-pigment" min="0.05" max="0.95" step="0.01" value="0.30" />
      <span class="god-value" id="gv-pigment">0.30</span>
    </label>

    <label class="god-row">
      <span class="god-label">Splatter Spread<small>organic edge chaos</small></span>
      <input type="range" id="gm-splat" min="0.20" max="1.80" step="0.01" value="0.55" />
      <span class="god-value" id="gv-splat">0.55</span>
    </label>

    <!-- WATER / FLOW -->
    <div class="god-section">
      <div class="god-section-label">Water &amp; Flow</div>

      <label class="god-row">
        <span class="god-label">Substrate Wetness<small>paper humidity</small></span>
        <input type="range" id="gm-wetness" min="0.0" max="1.0" step="0.01" value="0.40" />
        <span class="god-value" id="gv-wetness">0.40</span>
      </label>

      <label class="god-row">
        <span class="god-label">Diffusion Speed<small>how fast paint bleeds</small></span>
        <input type="range" id="gm-diffusion" min="0.02" max="0.65" step="0.01" value="0.30" />
        <span class="god-value" id="gv-diffusion">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Color Mixing<small>wet-on-wet merge</small></span>
        <input type="range" id="gm-mix" min="0.00" max="0.95" step="0.01" value="0.30" />
        <span class="god-value" id="gv-mix">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Gravity Drip<small>downward flow strength</small></span>
        <input type="range" id="gm-gravity" min="0.00" max="0.60" step="0.01" value="0.05" />
        <span class="god-value" id="gv-gravity">0.05</span>
      </label>
    </div>

    <!-- DRYING -->
    <div class="god-section">
      <div class="god-section-label">Drying &amp; Texture</div>

      <label class="god-row">
        <span class="god-label">Color Drying Time<small>seconds color stays active</small></span>
        <input type="range" id="gm-wetwindow" min="0.10" max="5.00" step="0.05" value="1.50" />
        <span class="god-value" id="gv-wetwindow">1.50s</span>
      </label>

      <label class="god-row">
        <span class="god-label">Evaporation Rate<small>how fast color dries</small></span>
        <input type="range" id="gm-evap" min="0.10" max="4.00" step="0.05" value="0.60" />
        <span class="god-value" id="gv-evap">0.60x</span>
      </label>

      <label class="god-row">
        <span class="god-label">Edge Intensity<small>border ring darkness</small></span>
        <input type="range" id="gm-edge" min="0.00" max="2.00" step="0.05" value="0.10" />
        <span class="god-value" id="gv-edge">0.10</span>
      </label>

      <label class="god-row">
        <span class="god-label">Border Blur<small>edge softness / dissolve</small></span>
        <input type="range" id="gm-borderblur" min="0.00" max="1.00" step="0.01" value="0.15" />
        <span class="god-value" id="gv-borderblur">0.15</span>
      </label>

      <label class="god-row">
        <span class="god-label">Granulation Depth<small>paper grain influence</small></span>
        <input type="range" id="gm-grain" min="0.10" max="2.20" step="0.05" value="1.00" />
        <span class="god-value" id="gv-grain">1.00</span>
      </label>

      <label class="god-row">
        <span class="god-label">Backrun Bloom<small>cauliflower bleed effect</small></span>
        <input type="range" id="gm-backrun" min="0.20" max="2.00" step="0.05" value="1.00" />
        <span class="god-value" id="gv-backrun">1.00</span>
      </label>
    </div>

    <button class="god-reset-btn" id="gm-reset">↺ Reset to Defaults</button>
  </aside>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
