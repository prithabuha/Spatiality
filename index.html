<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint World</title>

  <!-- Quicksand — rounded geometric sans-serif for the tactile paper theme -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- TactileTheme — full neumorphic paper design system -->
  <link rel="stylesheet" href="/src/TactileTheme.css">

  <style>
    /* ── Layout-only styles (not theme) ─────────────────────────────────── */
    /* These purely define structure / z-index — all visual styling is      */
    /* in TactileTheme.css so the theme can be swapped without touching HTML */

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* Three.js canvas lives at z-index 1 — below grain (2) and all panels  */
    #three-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Hand skeleton overlay — above canvas, pointer-events off              */
    #hand-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    /* Legacy finger cursor — hidden; WaterCursor owns the visual             */
    #finger-cursor { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <canvas id="three-canvas"></canvas>
  <canvas id="hand-overlay"></canvas>
  <div id="finger-cursor"></div>

  <!-- Webcam mini preview (bottom-right) -->
  <div id="webcam-mini">
    <video id="webcam-bg" autoplay playsinline muted></video>
  </div>

  <!-- ── Brush Lab ─────────────────────────────────────────────────────── -->
  <button id="brush-lab-toggle" type="button">Brush Lab</button>
  <aside id="brush-lab" class="is-collapsed" aria-label="Brush controls">
    <div class="lab-head">
      <strong>Watercolor Studio</strong>
      <span id="brush-profile-label">Balanced</span>
    </div>

    <label class="lab-row" for="brush-preset">
      <span>Preset</span>
      <select id="brush-preset">
        <option value="fresco">Fresco Detail</option>
        <option value="rebelle">Rebelle Inspired</option>
        <option value="wash">Soft Wash</option>
        <option value="dry">Dry Texture</option>
        <option value="splash">Wet Splatter</option>
      </select>
      <span class="lab-value"></span>
    </label>

    <label class="lab-row" for="brush-color">
      <span>Color</span>
      <input id="brush-color" type="color" value="#d93060" />
      <span class="lab-value"></span>
    </label>

    <label class="lab-row" for="brush-size">
      <span>Size</span>
      <input id="brush-size" type="range" min="0.016" max="0.09" step="0.001" value="0.034" />
      <span id="brush-size-value" class="lab-value">0.034</span>
    </label>

    <label class="lab-row" for="brush-water">
      <span>Water</span>
      <input id="brush-water" type="range" min="0.08" max="0.90" step="0.01" value="0.42" />
      <span id="brush-water-value" class="lab-value">0.42</span>
    </label>

    <label class="lab-row" for="brush-pigment">
      <span>Pigment</span>
      <input id="brush-pigment" type="range" min="0.10" max="0.90" step="0.01" value="0.34" />
      <span id="brush-pigment-value" class="lab-value">0.34</span>
    </label>

    <label class="lab-row" for="brush-mix">
      <span>Mixing</span>
      <input id="brush-mix" type="range" min="0.00" max="0.85" step="0.01" value="0.30" />
      <span id="brush-mix-value" class="lab-value">0.30</span>
    </label>

    <label class="lab-row" for="brush-smoothing">
      <span>Smoothing</span>
      <input id="brush-smoothing" type="range" min="0.00" max="0.85" step="0.01" value="0.25" />
      <span id="brush-smoothing-value" class="lab-value">0.25</span>
    </label>
  </aside>

  <!-- Hint chip (above palette) -->
  <div id="hint-chip">Point finger to paint · Wave both hands to clear ✦</div>

  <!-- ── God Mode ──────────────────────────────────────────────────────── -->
  <button id="god-mode-toggle" type="button">⚡ God Mode</button>
  <aside id="god-mode" class="is-collapsed" aria-label="God Mode controls">

    <div class="god-head">
      <strong>⚡ God Mode</strong>
      <span>DESIGNER CONTROLS</span>
    </div>

    <!-- BRUSH -->
    <div class="god-section-label">Brush</div>

    <label class="god-row">
      <span class="god-label">Brush Size<small>stroke footprint</small></span>
      <input type="range" id="gm-size" min="0.003" max="0.090" step="0.001" value="0.018" />
      <span class="god-value" id="gv-size">0.018</span>
    </label>

    <label class="god-row">
      <span class="god-label">Pigment Load<small>opacity / density</small></span>
      <input type="range" id="gm-pigment" min="0.05" max="0.95" step="0.01" value="0.30" />
      <span class="god-value" id="gv-pigment">0.30</span>
    </label>

    <label class="god-row">
      <span class="god-label">Splatter Spread<small>organic edge chaos</small></span>
      <input type="range" id="gm-splat" min="0.20" max="1.80" step="0.01" value="0.55" />
      <span class="god-value" id="gv-splat">0.55</span>
    </label>

    <!-- WATER / FLOW -->
    <div class="god-section">
      <div class="god-section-label">Water &amp; Flow</div>

      <label class="god-row">
        <span class="god-label">Substrate Wetness<small>paper humidity</small></span>
        <input type="range" id="gm-wetness" min="0.0" max="1.0" step="0.01" value="0.40" />
        <span class="god-value" id="gv-wetness">0.40</span>
      </label>

      <label class="god-row">
        <span class="god-label">Diffusion Speed<small>how fast paint bleeds</small></span>
        <input type="range" id="gm-diffusion" min="0.02" max="0.65" step="0.01" value="0.30" />
        <span class="god-value" id="gv-diffusion">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Color Mixing<small>wet-on-wet merge</small></span>
        <input type="range" id="gm-mix" min="0.00" max="0.95" step="0.01" value="0.30" />
        <span class="god-value" id="gv-mix">0.30</span>
      </label>

      <label class="god-row">
        <span class="god-label">Gravity Drip<small>downward flow strength</small></span>
        <input type="range" id="gm-gravity" min="0.00" max="0.60" step="0.01" value="0.05" />
        <span class="god-value" id="gv-gravity">0.05</span>
      </label>
    </div>

    <!-- DRYING -->
    <div class="god-section">
      <div class="god-section-label">Drying &amp; Texture</div>

      <label class="god-row">
        <span class="god-label">Color Drying Time<small>seconds color stays active</small></span>
        <input type="range" id="gm-wetwindow" min="0.10" max="5.00" step="0.05" value="1.50" />
        <span class="god-value" id="gv-wetwindow">1.50s</span>
      </label>

      <label class="god-row">
        <span class="god-label">Evaporation Rate<small>how fast color dries</small></span>
        <input type="range" id="gm-evap" min="0.10" max="4.00" step="0.05" value="0.60" />
        <span class="god-value" id="gv-evap">0.60x</span>
      </label>

      <label class="god-row">
        <span class="god-label">Edge Intensity<small>border ring darkness</small></span>
        <input type="range" id="gm-edge" min="0.00" max="2.00" step="0.05" value="0.10" />
        <span class="god-value" id="gv-edge">0.10</span>
      </label>

      <label class="god-row">
        <span class="god-label">Border Blur<small>edge softness / dissolve</small></span>
        <input type="range" id="gm-borderblur" min="0.00" max="1.00" step="0.01" value="0.15" />
        <span class="god-value" id="gv-borderblur">0.15</span>
      </label>

      <label class="god-row">
        <span class="god-label">Granulation Depth<small>paper grain influence</small></span>
        <input type="range" id="gm-grain" min="0.10" max="2.20" step="0.05" value="1.00" />
        <span class="god-value" id="gv-grain">1.00</span>
      </label>

      <label class="god-row">
        <span class="god-label">Backrun Bloom<small>cauliflower bleed effect</small></span>
        <input type="range" id="gm-backrun" min="0.20" max="2.00" step="0.05" value="1.00" />
        <span class="god-value" id="gv-backrun">1.00</span>
      </label>
    </div>

    <button class="god-reset-btn" id="gm-reset">↺ Reset to Defaults</button>
  </aside>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
